    :root {
      --primary-color: #54eb36;
      --primary-hover: #42ba2c;

      --bg-dark: #1a1a2e;
      --card-bg-light: #fff;
      --card-bg-dark: #16213e;
      --text-light: #333;
      --text-dark: #e0e0e0;
      --border-light: #dee2e6;
      --border-dark: #2a2a4a;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: var(--bg-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
      transition: all 0.3s ease;
    }

    body.dark-mode {
      background: var(--bg-dark);
    }

    body.dark-mode .main-card {
      background: var(--card-bg-dark);
      color: var(--text-dark);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    body.dark-mode .btn-custom {
      border-color: var(--primary-color);
      color: var(--primary-color);
    }

    body.dark-mode .btn-custom:hover {
      background-color: var(--primary-color);
      color: #000;
    }

    body.dark-mode .form-select,
    body.dark-mode .form-control {
      background: #0f3460;
      color: var(--text-dark);
      border-color: var(--border-dark);
    }

    body.dark-mode .form-select:focus,
    body.dark-mode .form-control:focus {
      background: #1a1a2e;
      color: var(--text-dark);
    }

    body.dark-mode .alert-light {
      background: #0f3460;
      color: var(--text-dark);
      border-color: var(--border-dark);
    }

    .main-card {
      background: var(--card-bg-light);
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 30px;
      width: 95%;
      max-width: 1100px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .btn-custom {
      background-color: transparent;
      border: 1.5px solid var(--primary-hover);
      color: var(--primary-hover);
      font-weight: 500;
      border-radius: 8px;
      padding: 8px 14px;
      transition: all 0.3s ease;
    }

    .btn-custom:hover {
      background-color: var(--primary-color);
      color: #000;
      border-color: var(--primary-color);
    }

    .btn-custom.active {
      background-color: var(--primary-color);
      color: #000;
      border-color: var(--primary-color);
      box-shadow: 0 0 10px var(--primary-color);
    }

    .form-select-custom {
      width: 100%;
      max-width: 750px;
      min-height: 45px;
      font-size: 14px;
      margin: 0 auto;
    }

    #texto-mtv {
      resize: none;
      overflow: hidden;
      height: auto;
    }

    /* ESTILOS PARA IMÁGENES EN LÍNEA - UNA AL LADO DE LA OTRA MÁS GRANDES */
    .imagenes-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    .imagen-item {
      flex: 1;
      min-width: 350px;
      max-width: 45%;
      text-align: center;
      background: transparent;
      border-radius: 12px;
      padding: 10px;
    }

    .imagen-item img {
      width: 100%;
      height: auto;
      max-height: 450px;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }

    .imagen-item a {
      display: block;
      text-decoration: none;
    }

    /* Cuando solo hay una imagen - SIN CONTENEDOR EXTRA, más grande */
    .imagen-sola {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 20px 0;
    }

    .imagen-sola img {
      max-width: 80%;
      max-height: 500px;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    .imagen-sola a {
      display: block;
      text-decoration: none;
    }

    /* Contenedor oculto */
    .hidden {
      display: none !important;
    }

    .btn-volver {
      margin-top: 30px;
      background: #6c757d;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 16px;
    }

    .btn-volver:hover {
      background: #5a6268;
      transform: scale(1.02);
    }

      background: #4b5563;
    }

      background: #374151;
    }

      .imagen-item {
        min-width: 280px;
        max-width: 100%;
      }
      
      .imagen-sola img {
        max-width: 95%;
        max-height: 350px;

/* ===== ESTILOS DE LA HORA - CENTRADO SIN SEPARACIÓN ===== */
.hora-container {
  display: flex;

  align-items: center;
  gap: 4px;
  cursor: pointer;
  user-select: none;
  margin-bottom: 15px;

  font-weight: 500;

  padding: 0;
  background: transparent;
}

body.dark-mode .hora-label {
  background: transparent;
  color: var(--text-dark);
}

/* Contenedor que recorta el movimiento */
.hora-wrapper {
  display: inline-block;
  overflow: hidden;
  width: 105px;
  position: relative;
}

/* Animación de la hora */
#hora-dinamica {
  display: inline-block;
  font-size: 14px;
  font-weight: 500;
  font-family: monospace;
  padding: 0;
  transition: transform 0.5s ease, opacity 0.5s ease;
  transform: translateX(0);
  opacity: 1;
  background: transparent;
}

body.dark-mode #hora-dinamica {
  background: transparent;
  color: var(--text-dark);
}

/* Estado oculto - se desliza hacia la izquierda */
.hora-oculta #hora-dinamica {
  transform: translateX(-120%);
  opacity: 0;
}

/* Estado visible - normal */
.hora-visible #hora-dinamica {
  transform: translateX(0);
  opacity: 1;
}

// Estado de visibilidad de la hora
let horaVisible = true;

// Función para actualizar la hora de España
function actualizarHora() {
  const horaElement = document.getElementById('hora-dinamica');
  if (horaElement) {
    const ahora = new Date();
    
    // Opción 1: Usar toLocaleTimeString con timeZone 'Europe/Madrid'
    const horaEspana = ahora.toLocaleTimeString('es-ES', {
      timeZone: 'Europe/Madrid',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: true
    });
    
    // Limpiar el formato (quitar puntos y espacios extra)
    let horaLimpia = horaEspana.replace(/\./g, '').replace(/\s+/g, ' ');
    
    horaElement.textContent = horaLimpia;
  }
}

// Iniciar el reloj
setInterval(actualizarHora, 1000);
actualizarHora();

// Función para toggle de la hora con efecto slide
function toggleHora() {
  const container = document.getElementById('horaContainer');
  
  if (horaVisible) {
    // Ocultar hora - añadir clase que desliza hacia la izquierda
    container.classList.remove('hora-visible');
    container.classList.add('hora-oculta');
    horaVisible = false;
  } else {
    // Mostrar hora - quitar clase oculta
    container.classList.remove('hora-oculta');
    container.classList.add('hora-visible');
    horaVisible = true;
  }
}

// Agregar evento de clic al contenedor de hora
document.getElementById('horaContainer').addEventListener('click', toggleHora);

// Estado inicial visible
document.getElementById('horaContainer').classList.add('hora-visible');

// =========================
// ===== FUNCIÓN PARA MOSTRAR IMÁGENES =====
// =========================

function mostrarImagenes(imgs, skill) {
  // Si es una sola imagen
  if (imgs.length === 1) {
    let src = imgs[0];
    if (skill === "MTV 2") {
      let url = "https://zeleris.abaigroup.co/wp-content/uploads/2025/04/SOPORTE_TECNICO__5_.pdf";
      if (src.includes("Desco")) {
        url = "https://zeleris.abaigroup.co/wp-content/uploads/2025/04/SOPORTE_TECNICO__5_.pdf#page=7";
      } else if (src.includes("Radio")) {
        url = "https://zeleris.abaigroup.co/wp-content/uploads/2025/04/SOPORTE_TECNICO__5_.pdf#page=12";
      }
      else if (src.includes("WIFI6")) {
        url = "https://zeleris.abaigroup.co/wp-content/uploads/2025/04/SOPORTE_TECNICO__5_.pdf#page=4";
      }
      else if (src.includes("HGU")) {
        url = "https://zeleris.abaigroup.co/wp-content/uploads/2025/04/SOPORTE_TECNICO__5_.pdf#page=3";
      }
      return `
        <div class="imagen-sola">
          <a href='${url}' target='_blank'>
            <img src='${src}' onerror="this.style.display='none'">
          </a>
        </div>
      `;
    } else {
      return `
        <div class="imagen-sola">
          <img src='${src}' onerror="this.style.display='none'">
        </div>
      `;
    }
  }
  
  // Si son 2 o más imágenes
  let html = '<div class="imagenes-wrapper">';
  
  imgs.forEach(src => {
    if (skill === "MTV 2") {
      let url = "https://zeleris.abaigroup.co/wp-content/uploads/2025/04/SOPORTE_TECNICO__5_.pdf#page=8";
      if (src.includes("Desco") || src.includes("WIFI6")) {
        url = "https://zeleris.abaigroup.co/wp-content/uploads/2025/04/SOPORTE_TECNICO__5_.pdf#page=5";
      } else if (src.includes("Radio")) {
        url = "https://zeleris.abaigroup.co/wp-content/uploads/2025/04/SOPORTE_TECNICO__5_.pdf#page=13";
      }
      else if (src.includes("WIFI6")) {
        url = "https://zeleris.abaigroup.co/wp-content/uploads/2025/04/SOPORTE_TECNICO__5_.pdf#page=4";
      }
      else if (src.includes("HGU")) {
        url = "https://zeleris.abaigroup.co/wp-content/uploads/2025/04/SOPORTE_TECNICO__5_.pdf#page=3";
      }
      html += `
        <div class="imagen-item">
          <a href='${url}' target='_blank'>
            <img src='${src}' onerror="this.style.display='none'">
          </a>
        </div>
      `;
    } else {
      html += `
        <div class="imagen-item">
          <img src='${src}' onerror="this.style.display='none'">
        </div>
      `;
    }
  });
  
  html += '</div>';
  return html;
}

function volverAlInicio() {
  const botonesPrincipales = document.getElementById('botones-principales');
  const contenidoDinamico = document.getElementById('contenido-dinamico');
  const titulo = document.querySelector('.main-card h2');
  // Restaurar el título original
  titulo.textContent = "Tipificaciones Zeleris";
  
  botonesPrincipales.classList.remove('hidden');
  contenidoDinamico.classList.add('hidden');
  contenidoDinamico.innerHTML = '';
}

// =========================
// ===== FUNCIONES PARA MOSTRAR CONTENIDO =====
// =========================

function mostrarSubBotonesMTV(skill) {
  const contenidoDinamico = document.getElementById('contenido-dinamico');
  const botonesPrincipales = document.getElementById('botones-principales');
  const titulo = document.querySelector('.main-card h2');
   // Cambiar el título según la selección
  if (skill === "MTV 1") {
    titulo.textContent = "MTV 1";
  } else if (skill === "MTV 2") {
    titulo.textContent = "MTV 2";
  }
  // Ocultar botones principales
  botonesPrincipales.classList.add('hidden');
  
  // Generar HTML
  let html = `
    <div id="area-mtv">
      <div id="sub-botones-mtv" class="d-flex justify-content-center gap-2 flex-wrap mb-3"></div>
      <div class="mb-3">
        <select id="selector-mtv" class="form-select form-select-custom hidden"></select>
      </div>
      <div id="desc-mtv" class="alert alert-light border hidden mx-auto" style="max-width: 600px;">
        <textarea id="texto-mtv" class="form-control" rows="3"></textarea>
        <div class="d-flex justify-content-end gap-2 mt-2">
          <button class="btn btn-success btn-sm" onclick="copiarTexto()">📋 Copiar</button>
        </div>
      </div>
      <div id="img-global" class="hidden"></div>
      <button class="btn-volver" onclick="volverAlInicio()">◀ Volver al Inicio</button>
    </div>
  `;
  
  contenidoDinamico.innerHTML = html;
  contenidoDinamico.classList.remove('hidden');
  
  // Cargar los sub-botones
  const cont = document.getElementById('sub-botones-mtv');
  const selector = document.getElementById('selector-mtv');
  
  configMTV[skill].forEach(item => {
    const btn = document.createElement('button');
    btn.className = "btn btn-custom";
    btn.textContent = item.nombre;
    btn.onclick = () => {
      document.querySelectorAll('#sub-botones-mtv .btn-custom').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      
      // Mostrar imágenes
      const imgDiv = document.getElementById('img-global');
      imgDiv.innerHTML = mostrarImagenes(item.imgs, skill);
      imgDiv.classList.remove('hidden');

      // Cargar selector con las descripciones específicas del producto
      selector.innerHTML = '<option value="">-- Selecciona una opción --</option>';
      const descripciones = item.descripciones || descripcionesGenericas;
      
      descripciones.forEach(opt => {
        const o = document.createElement('option');
        o.value = opt.texto;
        o.textContent = opt.opcion;
        selector.appendChild(o);
      });
      
      selector.classList.remove('hidden');
      document.getElementById('desc-mtv').classList.add('hidden');

      selector.onchange = () => {
        if (selector.value) {
          const desc = document.getElementById('desc-mtv');
          const textarea = document.getElementById('texto-mtv');
          textarea.value = selector.value;
          desc.classList.remove('hidden');
          ajustarTextarea();
        } else {
          document.getElementById('desc-mtv').classList.add('hidden');
        }
      };
    };
    cont.appendChild(btn);
  });
}

function mostrarCAC() {
  const contenidoDinamico = document.getElementById('contenido-dinamico');
  const botonesPrincipales = document.getElementById('botones-principales');
  const titulo = document.querySelector('.main-card h2');
  // Cambiar el título
  titulo.textContent = "CAC";
  
  // Ocultar botones principales
  botonesPrincipales.classList.add('hidden');
  
  // Generar HTML
  let html = `
    <div id="area-cac">
      <div class="row align-items-center justify-content-center g-3 mb-3">
        <div class="col-auto">
          <select id="selector-cac" class="form-select"></select>
        </div>
        <div class="col-auto">
          <div id="sub-botones-cac" class="d-flex gap-2 flex-wrap"></div>
        </div>
      </div>
      <div id="img-global" class="hidden"></div>
      <button class="btn-volver" onclick="volverAlInicio()">◀ Volver al Inicio</button>
    </div>
  `;
  
  contenidoDinamico.innerHTML = html;
  contenidoDinamico.classList.remove('hidden');
  
  // Cargar sub-botones CAC
  const cont = document.getElementById('sub-botones-cac');
  const selector = document.getElementById('selector-cac');
  cont.innerHTML = "";

  const nombres = ["Buzón CAC", "Códigos", "O2", "Abreviaturas"];
  const imgs = ["Buzon CAC", "Codigos", "O2", "Abreviaturas"];

  nombres.forEach((nom, i) => {
    const btn = document.createElement('button');
    btn.className = "btn btn-custom";
    btn.textContent = nom;
    btn.onclick = () => {
      cont.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selector.value = "";
      const imgDiv = document.getElementById('img-global');
      imgDiv.innerHTML = `<div class="imagen-sola"><img src='img/${imgs[i]}.png' onerror="this.style.display='none'"></div>`;
      imgDiv.classList.remove('hidden');
    };
    cont.appendChild(btn);
  });

  selector.innerHTML = '<option value="">-- Opciones CAC --</option>';
  Object.keys(datosCAC).forEach(k => {
    const o = document.createElement('option');
    o.value = k;
    o.textContent = datosCAC[k].n;
    selector.appendChild(o);
  });

  selector.onchange = () => {
    if (selector.value) {
      cont.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      const imgDiv = document.getElementById('img-global');
      imgDiv.innerHTML = `<div class="imagen-sola"><img src='${datosCAC[selector.value].i}' onerror="this.style.display='none'"></div>`;
      imgDiv.classList.remove('hidden');
    }
  };
}

// =========================
// ===== UTILIDADES =====
// =========================

function copiarTexto() {
  const textarea = document.getElementById("texto-mtv");
  if (textarea) {
    textarea.select();
    textarea.setSelectionRange(0, 99999);
    navigator.clipboard.writeText(textarea.value);
    
    // Mostrar notificación temporal
    const btn = event.target;
    const originalText = btn.textContent;
    btn.textContent = "✓ Copiado!";
    setTimeout(() => {
      btn.textContent = originalText;
    }, 1500);
  }
}

function ajustarTextarea() {
  const textarea = document.getElementById("texto-mtv");
  if (textarea) {
    textarea.style.height = "auto";
    textarea.style.height = textarea.scrollHeight + "px";
  }
}
