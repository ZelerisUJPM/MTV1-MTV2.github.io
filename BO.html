<!DOCTYPE html>
<html lang="es">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tipificaciones BO</title>
<link rel="icon" href="img/logo.ico" type="image/x-icon">

<style>
:root{
  /* ===== PALETA CLARO ===== */
  --primary-color:#54eb36;
  --primary-hover:#42ba2c;
  --text-color:#1a1a1a;
  --background-color:#fff;
  --border-color:#ddd;
  --shadow-color:rgba(0,0,0,0.12);
  --highlight-color:red;

  /* ===== MODO OSCURO ===== */
  --dark-gray-bg-base:#282828;
  --dark-gray-bg-secondary:#383838;
  --dark-gray-text-primary:#E0E0E0;
  --dark-gray-text-secondary:#B0B0B0;
  --dark-gray-accent:#A0A0A0;
  --shadow-color-dark-mode:rgba(255,255,255,0.03);
}

/* ===== RESET ===== */
*{box-sizing:border-box}

/* ===== BODY ===== */
body{
  font-family:'Segoe UI',Arial,sans-serif;
  background:#e0e7ec;
  margin:0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px 20px 60px;
  color:var(--text-color);
}

/* ===== LOGO ===== */
.logo-empresa{
  width:100%;
  display:flex;
  justify-content:center;
  margin-bottom:10px;
}

.logo-empresa img{
  max-width:500px;
  width:100%;
  height:auto;
}

/* ===== CONTENEDOR ===== */
.app{
  background:var(--background-color);
  width:100%;
  max-width:720px;
  padding:32px;
  border-radius:12px;
  box-shadow:0 4px 12px var(--shadow-color);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:26px;
}

/* ===== TITULOS ===== */
h1,h2{
  margin:0;
  text-align:center;
  color:var(--text-color);
}

/* ===== BOTONES ===== */
.buttons{
  width:100%;
  max-width:520px;
  display:grid;
  gap:14px;
  grid-template-columns:repeat(auto-fit,minmax(90px,1fr));
}

.buttons-secondary{
  display:flex;
  gap:10px;
}

.buttons-secondary button{
  flex:1;
  padding:10px;
  font-size:14px;
}

/* BOTONES GENERALES */
button{
  background:var(--primary-color);
  color:#000;
  border:none;
  padding:14px 0;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 4px 10px var(--shadow-color);
}

/* hover general (NO afecta botón dark mode) */
button:hover:not(.btn-dark-mode){
  background:var(--primary-hover);
  transform:scale(1.05);
}

/* BOTÓN ACTIVO */
button.active{
  box-shadow:0 0 10px var(--highlight-color);
  border:2px solid var(--highlight-color);
}

/* ===== SELECTOR ===== */
.selector{
  width:100%;
  max-width:520px;
  display:none;
  flex-direction:column;
  gap:14px;
}

select{
  padding:12px;
  border-radius:6px;
  border:1px solid var(--border-color);
}

textarea{
  width:100%;
  height:160px;
  max-height:300px;
  padding:14px;
  border-radius:8px;
  border:1px solid var(--border-color);
  resize:none;
  overflow-y:auto;
}

/* ===== ACCIONES ===== */
.actions{
  display:flex;
  gap:12px;
  justify-content:center;
}

.actions button{
  padding:10px 24px;
  font-size:.9rem;
}

/* ===== TOAST ===== */
.toast{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%) translateY(-10px);
  background:var(--primary-color);
  color:#000;
  padding:12px 22px;
  border-radius:999px;
  font-weight:600;
  opacity:0;
  pointer-events:none;
  transition:.3s ease;
  z-index:999;
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* ===== FOOTER ===== */
footer{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  font-size:0.85rem;
  color:#555;
  text-align:center;
}

/* ===== VALIDADOR ===== */
#validadorPlazo{
  background:#f9f9f9;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 6px var(--shadow-color);
}

#validadorPlazo label{
  font-weight:600;
  font-size:14px;
}

#validadorPlazo input[type="date"]{
  padding:10px;
  border-radius:6px;
  border:1px solid var(--border-color);
  font-size:14px;
}

#validadorPlazo input[type="date"]:focus{
  border-color:#007bff;
  outline:none;
  box-shadow:0 0 5px rgba(0,123,255,0.3);
}

#validadorPlazo button{
  margin-top:10px;
  padding:10px;
  border-radius:6px;
  background:#007bff;
  color:#fff;
}

#validadorPlazo button:hover{
  background:#0056b3;
}

#resultadoDias{
  margin-top:10px;
  font-size:15px;
}

/* ===== RELOJ ===== */
.hora-espana{
  text-align:center;
  font-size:1.5em;
  margin-bottom:20px;
  font-family:'Roboto',sans-serif;
  cursor:pointer;
}

#hora-dinamica{
  display:inline-block;
  transition:transform 0.5s ease, opacity 0.5s ease;
  transform:translateX(0);
  opacity:1;
}

#hora-dinamica.slide-hidden{
  transform:translateX(-100%);
  opacity:0;
}

#hora-dinamica.slide-from-right{
  transform:translateX(100%);
  opacity:0;
}

/* ===== BOTÓN DARK MODE (SOLO IMAGEN LIMPIA) ===== */
.btn-dark-mode{
  position:fixed;
  top:15px;
  left:15px;
  width:42px;
  height:42px;
  padding:0;
  margin:0;
  border:none;
  outline:none;
  background:transparent;
  box-shadow:none;
  cursor:pointer;
  z-index:9999;

  display:flex;
  align-items:center;
  justify-content:center;

  -webkit-appearance:none;
  appearance:none;
}

/* sin efecto al interactuar */
.btn-dark-mode:focus,
.btn-dark-mode:active{
  outline:none;
  box-shadow:none;
}

/* imagen perfecta */
.btn-dark-mode img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  pointer-events:none;
  transition:transform 0.8s ease-in-out;
}

/* rotación estilo MTV */
.btn-dark-mode.rotated img{
  transform:rotate(180deg);
}

/* sin hover */
.btn-dark-mode:hover{
  background:transparent !important;
  box-shadow:none !important;
  transform:none !important;
}

/* ===== DARK MODE GLOBAL ===== */
body.dark-mode{
  background-color:var(--dark-gray-bg-base);
  color:var(--dark-gray-text-primary);
}

body.dark-mode .app,
body.dark-mode #validadorPlazo{
  background-color:var(--dark-gray-bg-secondary);
  color:var(--dark-gray-text-primary);
  box-shadow:0 2px 6px var(--shadow-color-dark-mode);
}

body.dark-mode h1,
body.dark-mode h2,
body.dark-mode label,
body.dark-mode p{
  color:var(--dark-gray-text-primary);
}

body.dark-mode input,
body.dark-mode select,
body.dark-mode textarea{
  background-color:var(--dark-gray-bg-secondary);
  color:var(--dark-gray-text-primary);
  border:1px solid var(--dark-gray-text-secondary);
}

body.dark-mode button:not(.btn-dark-mode){
  background-color:var(--dark-gray-accent);
  color:var(--dark-gray-bg-base);
}

body.dark-mode button:not(.btn-dark-mode):hover{
  filter:brightness(1.1);
}

body.dark-mode footer{
  color:var(--dark-gray-text-secondary);
}

body.dark-mode .logo-empresa img{
  filter:drop-shadow(0 0 3px white);
}

body.dark-mode #validadorPlazo input[type="date"]{
  background-color:var(--dark-gray-bg-base);
  color:var(--dark-gray-text-primary);
}

body.dark-mode .toast{
  background:var(--dark-gray-accent);
  color:var(--dark-gray-bg-base);
}
</style>
</head>

<body>

<div id="hora-espana" class="hora-espana">Hora en España: <span id="hora-dinamica"></span></div>

<button class="btn-dark-mode" id="toggleDarkMode">
  <img src="img/oscuro.ico" alt="Modo oscuro">
</button>

<!-- LOGO SUPERIOR -->
<div id="logo-empresa" class="logo-empresa">
  <img src="img/empresa.png" alt="Logo de la Empresa">
</div>

<div class="app">
  
  <h1>Tipificaciones ZContactos</h1>

  <div class="buttons">
    <button data-t="T01">T01</button>
    <button data-t="T05">T05</button>
    <button data-t="T11">T11</button>
    <button data-t="T12">T12</button>
    <button data-t="T40">T40</button>
  </div>

  <div class="buttons-secondary">
    <button data-t="Agil">Agilizaciones</button>
    <button onclick="mostrarValidador()">Validar Plazo</button>
    <button data-t="FPO">Fuera de Plazo Otros</button>
  </div>

<div id="validadorPlazo" style="display:none; width:100%; max-width:520px; flex-direction:column; gap:10px;">
  
  <label>📅 Fecha entrega:</label>
<input type="date" id="fechaEntrega">

<label>📆 Fecha actual:</label>
<input type="date" id="fechaActual">

  <button onclick="calcularDias()">Calcular días</button>

  <p id="resultadoDias" style="font-weight:bold;"></p>

</div>

  <div class="selector" id="selector">
    <select id="tipSelect"></select>
    <textarea id="tipText"></textarea>
    <div class="actions">
  <button id="copyBtn">Copiar</button>
  <button id="resetBtn">Reset</button>
    </div>
  </div>
</div>

<div id="toast" class="toast">Tipificación copiada</div>

<footer>
  © Ing. Javier Mastrangelo. Todos los derechos reservados.
</footer>

<script>
const data={
  T01: [
      "SE SOLICITA ALBARAN",
      "ALBARAN ENVIADO",
      "MAL TABULADO",
      "FALTA CORREO",
      "FUERA DE PLAZO",
      "PEDIDO DEVUELTO",
      "SE INFORMA PEDIDO IMEI XXXXX - ABONO",
      "TABULAR INCIDENCIA SOLICITUD ALBARAN SIN REPOSICIÓN.","FUERA DE PLAZO +30"
      ],
    T05: [
      "ENVIAR A TIENDA",
      "NO ENTREGADO",
      "PEDIDO DEVUELTO",
      "PENDIENTE DE RECOGIDA",
      "TEXTO LIBRE",
      "MAL TABULADO",
      "FALTAN DATOS",
      "ESCALAR A WF DE GAMA BLANCA (SE USA CUANDO APARECE 9014)",
      "ESCALAR A POSVENTA",
      "EN PROCESO DE DEVOLUCIÓN", "ZPS", "TV >= 55”", "FALLIDA"
       ],
    T11: [
      "PENDIENTE ENTREGA", "SE ACTUALIZAN LOS DATOS", "ENTREGADO", "NO ES POSIBLE CAMBIO DE TELEFONO POR TELCO", "PEDIDO DEVUELTO", "EN PROCESO DE DEVOLUCIÓN", "NO ES POSIBLE CAMBIO DE DIRECCION", "FALTA DEF", "PEDIDO ESTA ANULADO"
      ],
    T12: ["ENTREGADO", "NO CONSTA DEVUELTO", "SOLICITADO REENVÍO"],
    T40: [
      "ENTREGADO", "PEDIDO DEVUELTO", "ALBARAN ENVIADO", "PENDIENTE ENTREGA", "PEDIDO ANULADO", "FALTAN DATOS"
      ],
    Agil:[
      "PEDIDO CON INCIDENCIA DE TRANSPORTES", 
      "PEDIDO CONTABILIZADO", "PEDIDO EN DISTRIBUCIÓN O REPARTO",
      "PEDIDO CON FALTA DE STOCK", "EN PROCESO DE DEVOLUCIÓN",
      "PEDIDO ENTREGADO", "PEDIDO CON BLOQUEO DE ENTREGA / MANIPULACION PEDIDO",
      "PEDIDO INCOMPLETO FALTA TECNICO COMERCIAL", 
      "PEDIDO INCOMPLETO"
      ],
     FPO:[
      "NO CONTACTO CON DTT", "NO DESEA EL ALBARAN", "NO LO NECESITA", "NO PLAZAS/ ARIL (CUANDO SE BUSCA EN TODOS LOS APLICATIVOS Y NO APARECE NADA)", "NO HAY EVIDENCIAS"
     ] 
  };


  const descriptions = {
    "NO CONTACTO CON DTT":"IMPROCEDENTE: DENEGADO NO CONTACTO CON DTT", "FALTA DEF":"IMPROCEDENTE: FALTA DEF", "PENDIENTE ENTREGA":"PENDIENTE DE ENTREGA, ENTREGA ESTIMADA EN 24–48 HORAS LABORABLES.", "PEDIDO ESTA ANULADO":"IMPROCEDENTE: NO PODEMOS TRAMITAR ESTA SOLICITUD PORQUE EL PEDIDO ESTÁ ANULADO.", "PEDIDO ANULADO":"PEDIDO ANULADO SEGÚN LO SOLICITADO.", "NO ENTREGADO":"IMPROCEDENTE: PEDIDO NO CONSTA ENTREGADO", "TV >= 55”":"PENDIENTE DE CONCERTAR CITA CON EL CLIENTE EN 24/48/72H LABORABLES.", "ZPS":"GESTIONADO PEDIDO DE SUSTITUCIÓN, RECOGIDA Y ENTREGA SIMULTANEA ESTIMADA EN 24–48 HORAS LABORABLES.", "FUERA DE PLAZO +30":"IMPROCEDENTE: FUERA DE PLAZO +30 DIAS PARA LA RECLAMACIÓN","EN PROCESO DE DEVOLUCIÓN":"EN PROCESO DE DEVOLUCIÓN, DEVOLUCIÓN ESTIMADA EN 24/48 HORAS LABORALES", "NO DESEA EL ALBARAN":"IMPROCEDENTE: DENEGADO CLIENTE NO DESEA EL ALBARAN", "NO LO NECESITA":"IMPROCEDENTE: DENEGADO CLIENTE NO LO NECESITA", "NO PLAZAS/ ARIL (CUANDO SE BUSCA EN TODOS LOS APLICATIVOS Y NO APARECE NADA)":"IMPROCEDENTE: DENEGADO NO PLAZAS/ ARIL", "NO HAY EVIDENCIAS":"IMPROCEDENTE: NO HAY EVIDENCIAS", "PEDIDO CON INCIDENCIA DE TRANSPORTES":"IMPROCEDENTE: PEDIDO CON INCIDENCIA DE TRANSPORTES", "PEDIDO CONTABILIZADO":"IMPROCEDENTE: PEDIDO CONTABILIZADO", "PEDIDO EN DISTRIBUCIÓN O REPARTO":"IMPROCEDENTE: PEDIDO EN DISTRIBUCIÓN O REPARTO, ENTREGA ESTIMADA EN 24–48 HORAS LABORABLES.", "PEDIDO CON FALTA DE STOCK":"IMPROCEDENTE: PEDIDO CON FALTA DE STOCK", "PEDIDO ENTREGADO":"IMPROCEDENTE: PEDIDO ENTREGADO", "PEDIDO CON BLOQUEO DE ENTREGA / MANIPULACION PEDIDO":"IMPROCEDENTE: PEDIDO CON BLOQUEO DE ENTREGA / MANIPULACION PEDIDO", "PEDIDO INCOMPLETO FALTA TECNICO COMERCIAL":"IMPROCEDENTE:PEDIDO INCOMPLETO FALTA TECNICO COMERCIAL", "PEDIDO INCOMPLETO":"IMPROCEDENTE: PEDIDO INCOMPLETO FALTA DETERMINACION DE PRECIO", "SE SOLICITA ALBARAN": "COMPROBANTE DE ENTREGA SOLICITADO PARA SU ENVÍO AL CLIENTE.","ALBARAN ENVIADO":"EL COMPROBANTE DE ENTREGA HA SIDO ENVIADO AL CLIENTE.", "PENDIENTE DE CONCERTAR CITA CON EL CLIENTE PARA SU RECOGIDA":"PENDIENTE DE CONCERTAR CITA CON EL CLIENTE PARA SU RECOGIDA","MAL TABULADO": "IMPROCEDENTE: MAL TABULADO, TABULAR XXX", "FALTA CORREO": "IMPROCEDENTE: FALTA DE INFORMACION INDICAR CORREO", "FUERA DE PLAZO": "IMPROCEDENTE: FUERA DE PLAZO", "PEDIDO DEVUELTO": "IMPROCEDENTE: EL PEDIDO NO SE ENTREGÓ Y HA SIDO DEVUELTO AL ALMACÉN. LA DEVOLUCIÓN ESTÁ GESTIONADA.", "SE INFORMA PEDIDO IMEI XXXXX - ABONO": "IMPROCEDENTE: SE INFORMA PEDIDO IMEI XXXXX - ABONO", "TABULAR INCIDENCIA SOLICITUD ALBARAN SIN REPOSICIÓN.": "IMPROCEDENTE: TABULAR INCIDENCIA SOLICITUD ALBARAN SIN REPOSICIÓN.", "ENVIAR A TIENDA": "IMPROCEDENTE: AL SER UN EQUIPAMIENTO MÓVIL DE RENT EL DESISTIMIENTO TIENE QUE GESTIONARSE EN CUALQUIER TIENDA DE MOVISTAR","ENTREGADO":"ENTREGADO", "PENDIENTE DE RECOGIDA":"PENDIENTE DE RECOGIDA, RECOGIDA ESTIMADA EN 24–48 HORAS LABORABLES.", "FALTAN DATOS":"IMPROCEDENTE: FALTAN DATOS", "NO ES POSIBLE CAMBIO DE DIRECCION":"IMPROCEDENTE: NO ES POSIBLE CAMBIO DE DIRECCION", "ESCALAR A WF DE GAMA BLANCA (SE USA CUANDO APARECE 9014)":"IMPROCEDENTE: ESCALAR A WF DE GAMA BLANCA", "ESCALAR A POSVENTA":"IMPROCEDENTE: ESCALAR A POSVENTA", "NO ES POSIBLE CAMBIO DE TELEFONO POR TELCO":"IMPROCEDENTE: NO ES POSIBLE CAMBIO DE TELEFONO POR TELCO","SE ACTUALIZAN LOS DATOS":"SE ACTUALIZAN LOS DATOS", "TEXTO LIBRE": "10-12-2025 NOMBRE TRAMITADA RECOGIDA POR DESISTIMIENTO INC ", "NO CONSTA DEVUELTO":"IMPROCEDENTE: PEDIDO NO CONSTA DEVUELTO", "SOLICITADO REENVÍO":"SOLICITADO REENVÍO", "FALLIDA":"IMPROCEDENTE: RECOGIDA FALLIDA POR CLIENTE XXX; SI HAY QUE INTENTAR DE NUEVO LA RECOGIDA, HAY QUE GENERAR UN NUEVO ZCONTACTOS DE “REINTENTO DE RECOGIDA”."
  };


// =========================
// 🧠 VARIABLES
// =========================
  
const editedTexts = {};
let currentKey = "";
let currentTip = "";

const selector = document.getElementById('selector');
const select = document.getElementById('tipSelect');
const textarea = document.getElementById('tipText');
const toast = document.getElementById('toast');
const allButtons = document.querySelectorAll('.buttons button,.buttons-secondary button');

// =========================
// 🔘 BOTONES
// =========================
allButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    allButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    currentKey = btn.dataset.t;
    if (!currentKey) return;

    const sorted = data[currentKey].slice().sort((a,b)=>a.localeCompare(b,'es'));

    select.innerHTML = '';
    sorted.forEach(item => {
      const opt = document.createElement('option');
      opt.value = item;
      opt.textContent = item;
      select.appendChild(opt);
    });

    currentTip = sorted[0];
    select.value = currentTip;

    cargarTexto();
    selector.style.display = 'flex';
  });
});

// =========================
// 🔄 SELECT
// =========================
select.addEventListener('change', () => {
  currentTip = select.value;
  cargarTexto();
});

function cargarTexto(){
  const memKey = `${currentKey}|${currentTip}`;
  textarea.value = editedTexts[memKey] ?? descriptions[currentTip] ?? '';
}

// =========================
// ✍️ GUARDAR EDICIÓN
// =========================
textarea.addEventListener('input', () => {
  if(!currentKey || !currentTip) return;
  editedTexts[`${currentKey}|${currentTip}`] = textarea.value;
});

// =========================
// 📋 COPIAR (MODERNO)
// =========================
document.getElementById('copyBtn').addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(textarea.value);
    mostrarToast("Tipificación copiada");
  } catch {
    mostrarToast("Error al copiar");
  }
});

// =========================
// 🔄 RESET
// =========================
document.getElementById('resetBtn').addEventListener('click', () => {
  if(!currentKey || !currentTip) return;

  const memKey = `${currentKey}|${currentTip}`;
  delete editedTexts[memKey];

  textarea.value = descriptions[currentTip] ?? '';
  mostrarToast("Tipificación restablecida");
});

// =========================
// 🔔 TOAST
// =========================
function mostrarToast(msg){
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),2000);
}

// =========================
// 📅 VALIDADOR
// =========================
function mostrarValidador(){
  const div = document.getElementById("validadorPlazo");
  div.style.display = div.style.display === "none" ? "flex" : "none";

  const hoy = new Date().toISOString().split('T')[0];
  document.getElementById("fechaActual").value = hoy;
}

function calcularDias(){
  const f1 = document.getElementById("fechaEntrega").value;
  const f2 = document.getElementById("fechaActual").value;
  const resultado = document.getElementById("resultadoDias");

  if(!f1 || !f2){
    resultado.innerText = "⚠️ Selecciona ambas fechas";
    return;
  }

  const fechaEntrega = new Date(f1);
  const fechaActual = new Date(f2);

  const diferencia = fechaActual - fechaEntrega;
  const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));

  if(dias < 0){
    resultado.innerText = "⚠️ La fecha actual no puede ser menor";
    return;
  }

  resultado.innerText = `Han transcurrido ${dias} días`;
}

// =========================
// ⏰ HORA ESPAÑA
// =========================
function actualizarHoraEspana() {
  const opciones = {
    timeZone: 'Europe/Madrid',
    hour: 'numeric',
    minute: '2-digit',
    second: '2-digit',
    hour12: true
  };

  const hora = document.getElementById('hora-dinamica');
  if (hora) {
    hora.textContent = new Intl.DateTimeFormat('es-ES', opciones).format(new Date());
  }
}

setInterval(actualizarHoraEspana, 1000);
actualizarHoraEspana();

// =========================
// 🎬 ANIMACIÓN RELOJ
// =========================
document.getElementById('hora-espana').addEventListener('click', () => {
  const timeSpan = document.getElementById('hora-dinamica');

  if (!timeSpan.classList.contains('slide-hidden')) {
    timeSpan.classList.add('slide-hidden');
  } else {
    timeSpan.classList.remove('slide-hidden');
    timeSpan.classList.add('slide-from-right');
    void timeSpan.offsetWidth;
    timeSpan.classList.remove('slide-from-right');
  }
});

// =========================
// 🌙 DARK MODE (CON MEMORIA)
// =========================
const btn = document.getElementById("toggleDarkMode");

// cargar estado guardado
if(localStorage.getItem("darkMode") === "true"){
  document.body.classList.add("dark-mode");
  btn.classList.add("rotated");
}

btn.addEventListener("click", () => {
  document.body.classList.toggle("dark-mode");
  btn.classList.toggle("rotated");

  localStorage.setItem("darkMode",
    document.body.classList.contains("dark-mode")
  );
});
</script>

</body>
</html>
