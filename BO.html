<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tipificaciones BO</title>
<link rel="icon" href="img/logo.ico" type="image/x-icon">

<style>
:root{
  --primary:#54eb36;
  --primary-hover:#42ba2c;
  --bg:#eef2f5;
  --card:#fff;
  --text:#1a1a1a;
  --border:#ddd;
  --active:red;
}

*{box-sizing:border-box}

body{
  font-family:'Segoe UI',Arial,sans-serif;
  background:linear-gradient(135deg,#e6f7e3,#eef2f5);
  margin:0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px 20px 60px;
}

/* LOGO */
.logo-empresa{
  width:100%;
  display:flex;
  justify-content:center;
  margin-bottom:20px;
}

.logo-empresa img{
  max-width:500px;
  width:100%;
  height:auto;
}

/* CONTENEDOR PRINCIPAL */
.app{
  background:var(--card);
  width:100%;
  max-width:720px;
  padding:32px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.12);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:26px;
}

/* TITULO */
h1{
  margin:0;
  font-size:1.8rem;
  text-align:center;
}

/* BOTONES */
.buttons{
  width:100%;
  max-width:520px;
  display:grid;
  gap:14px;
}

.buttons-secondary {
  display: flex;
  gap: 10px;
}

.buttons-secondary button {
  flex: 1;              /* TODOS ocupan el mismo espacio */
  padding: 10px;
  font-size: 14px;
  cursor: pointer;
}


.buttons{
  grid-template-columns:repeat(auto-fit,minmax(90px,1fr));
}

.buttons-secondary{
  grid-template-columns:1fr 1fr;
}

button{
  background:var(--primary);
  border:none;
  padding:14px 0;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
  box-shadow:0 4px 10px rgba(0,0,0,.12);
}

button:hover{
  background:var(--primary-hover);
  transform:translateY(-2px);
}

button.active{
  box-shadow:0 0 12px var(--active);
  border:2px solid var(--active);
}

/* SELECTOR */
.selector{
  width:100%;
  max-width:520px;
  display:none;
  flex-direction:column;
  gap:14px;
}

select{
  padding:12px;
  border-radius:8px;
  border:1px solid var(--border);
}

textarea{
  width:100%;
  height:160px;
  max-height:300px;
  padding:14px;
  border-radius:10px;
  border:1px solid var(--border);
  resize:none;
  overflow-y:auto;
}

.actions{
  display:flex;
  gap:12px;
  justify-content:center;
}

.actions button{
  padding:10px 24px;
  font-size:.9rem;
  display:flex;
  gap:12px;
  justify-content:center;
}

/* TOAST */
.toast{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%) translateY(-10px);
  background:var(--primary);
  padding:12px 22px;
  border-radius:999px;
  font-weight:600;
  opacity:0;
  pointer-events:none;
  transition:.3s ease;
  z-index:999;
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* FOOTER */
footer{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  font-size:0.85rem;
  color:#555;
  text-align:center;
}

/* Contenedor del validador */
#validadorPlazo {
  background: #f8f9fa;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* Labels */
#validadorPlazo label {
  font-weight: 600;
  font-size: 14px;
  margin-top: 5px;
}

/* Inputs de fecha */
#validadorPlazo input[type="date"] {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
  transition: all 0.2s ease;
}

/* Efecto al enfocar */
#validadorPlazo input[type="date"]:focus {
  border-color: #007bff;
  outline: none;
  box-shadow: 0 0 5px rgba(0,123,255,0.3);
}

/* Botón calcular */
#validadorPlazo button {
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background-color: #007bff;
  color: white;
  cursor: pointer;
  transition: background 0.2s;
}

#validadorPlazo button:hover {
  background-color: #0056b3;
}

/* Resultado */
#resultadoDias {
  margin-top: 10px;
  font-size: 15px;
}


#relojEspaña {
  font-size: 30px;       /* 👈 tamaño general más grande */
}

#horaTexto {
  display: inline-block;
  font-size: 20px;       /* 👈 hora un poco más grande que el texto */
  margin-left: 5px;      /* 👈 menos separación */
  transition: transform 0.4s ease, opacity 0.4s ease;
}

.oculto {
  transform: translateX(-60px);
  opacity: 0;
}

</style>
</head>

<body>

<div id="relojEspaña" onclick="toggleHora()" style="
  width:100%;
  text-align:center;
  color:BLACK;
  padding:10px;
  font-weight:bold;
  cursor:pointer;
">
  Hora España: <span id="horaTexto">--:--:--</span>
</div>

<!-- LOGO SUPERIOR -->
<div id="logo-empresa" class="logo-empresa">
  <img src="img/empresa.png" alt="Logo de la Empresa">
</div>

<div class="app">
  
  <h1>Tipificaciones ZContactos</h1>

  <div class="buttons">
    <button data-t="T01">T01</button>
    <button data-t="T05">T05</button>
    <button data-t="T11">T11</button>
    <button data-t="T12">T12</button>
    <button data-t="T40">T40</button>
  </div>

  <div class="buttons-secondary">
    <button data-t="Agil">Agilizaciones</button>
    <button onclick="mostrarValidador()">Validar Plazo</button>
    <button data-t="FPO">Fuera de Plazo Otros</button>
  </div>

<div id="validadorPlazo" style="display:none; width:100%; max-width:520px; flex-direction:column; gap:10px;">
  
  <label>📅 Fecha entrega:</label>
<input type="date" id="fechaEntrega">

<label>📆 Fecha actual:</label>
<input type="date" id="fechaActual">

  <button onclick="calcularDias()">Calcular días</button>

  <p id="resultadoDias" style="font-weight:bold;"></p>

</div>

  <div class="selector" id="selector">
    <select id="tipSelect"></select>
    <textarea id="tipText"></textarea>
    <div class="actions">
  <button id="copyBtn">Copiar</button>
  <button id="resetBtn">Reset</button>
    </div>
  </div>
</div>

<div id="toast" class="toast">Tipificación copiada</div>

<footer>
  © Ing. Javier Mastrangelo. Todos los derechos reservados.
</footer>

<script>
const data={
  T01: [
      "SE SOLICITA ALBARAN",
      "ALBARAN ENVIADO",
      "MAL TABULADO",
      "FALTA CORREO",
      "FUERA DE PLAZO",
      "PEDIDO DEVUELTO",
      "SE INFORMA PEDIDO IMEI XXXXX - ABONO",
      "TABULAR INCIDENCIA SOLICITUD ALBARAN SIN REPOSICIÓN.","FUERA DE PLAZO +30"
      ],
    T05: [
      "ENVIAR A TIENDA",
      "NO ENTREGADO",
      "PEDIDO DEVUELTO",
      "PENDIENTE DE RECOGIDA",
      "TEXTO LIBRE",
      "MAL TABULADO",
      "FALTAN DATOS",
      "ESCALAR A WF DE GAMA BLANCA (SE USA CUANDO APARECE 9014)",
      "ESCALAR A POSVENTA",
      "EN PROCESO DE DEVOLUCIÓN", "ZPS", "TV >= 55”", "FALLIDA"
       ],
    T11: [
      "PENDIENTE ENTREGA", "SE ACTUALIZAN LOS DATOS", "ENTREGADO", "NO ES POSIBLE CAMBIO DE TELEFONO POR TELCO", "PEDIDO DEVUELTO", "EN PROCESO DE DEVOLUCIÓN", "NO ES POSIBLE CAMBIO DE DIRECCION", "FALTA DEF", "PEDIDO ESTA ANULADO"
      ],
    T12: ["ENTREGADO", "NO CONSTA DEVUELTO", "SOLICITADO REENVÍO"],
    T40: [
      "ENTREGADO", "PEDIDO DEVUELTO", "ALBARAN ENVIADO", "PENDIENTE ENTREGA", "PEDIDO ANULADO", "FALTAN DATOS"
      ],
    Agil:[
      "PEDIDO CON INCIDENCIA DE TRANSPORTES", 
      "PEDIDO CONTABILIZADO", "PEDIDO EN DISTRIBUCIÓN O REPARTO",
      "PEDIDO CON FALTA DE STOCK", "EN PROCESO DE DEVOLUCIÓN",
      "PEDIDO ENTREGADO", "PEDIDO CON BLOQUEO DE ENTREGA / MANIPULACION PEDIDO",
      "PEDIDO INCOMPLETO FALTA TECNICO COMERCIAL", 
      "PEDIDO INCOMPLETO"
      ],
     FPO:[
      "NO CONTACTO CON DTT", "NO DESEA EL ALBARAN", "NO LO NECESITA", "NO PLAZAS/ ARIL (CUANDO SE BUSCA EN TODOS LOS APLICATIVOS Y NO APARECE NADA)", "NO HAY EVIDENCIAS"
     ] 
  };


  const descriptions = {
    "NO CONTACTO CON DTT":"IMPROCEDENTE: DENEGADO NO CONTACTO CON DTT", "FALTA DEF":"IMPROCEDENTE: FALTA DEF", "PENDIENTE ENTREGA":"PENDIENTE DE ENTREGA, ENTREGA ESTIMADA EN 24–48 HORAS LABORABLES.", "PEDIDO ESTA ANULADO":"IMPROCEDENTE: NO PODEMOS TRAMITAR ESTA SOLICITUD PORQUE EL PEDIDO ESTÁ ANULADO.", "PEDIDO ANULADO":"PEDIDO ANULADO SEGÚN LO SOLICITADO.", "NO ENTREGADO":"IMPROCEDENTE: PEDIDO NO CONSTA ENTREGADO", "TV >= 55”":"PENDIENTE DE CONCERTAR CITA CON EL CLIENTE EN 24/48/72H LABORABLES.", "ZPS":"GESTIONADO PEDIDO DE SUSTITUCIÓN, RECOGIDA Y ENTREGA SIMULTANEA ESTIMADA EN 24–48 HORAS LABORABLES.", "FUERA DE PLAZO +30":"IMPROCEDENTE: FUERA DE PLAZO +30 DIAS PARA LA RECLAMACIÓN","EN PROCESO DE DEVOLUCIÓN":"EN PROCESO DE DEVOLUCIÓN, DEVOLUCIÓN ESTIMADA EN 24/48 HORAS LABORALES", "NO DESEA EL ALBARAN":"IMPROCEDENTE: DENEGADO CLIENTE NO DESEA EL ALBARAN", "NO LO NECESITA":"IMPROCEDENTE: DENEGADO CLIENTE NO LO NECESITA", "NO PLAZAS/ ARIL (CUANDO SE BUSCA EN TODOS LOS APLICATIVOS Y NO APARECE NADA)":"IMPROCEDENTE: DENEGADO NO PLAZAS/ ARIL", "NO HAY EVIDENCIAS":"IMPROCEDENTE: NO HAY EVIDENCIAS", "PEDIDO CON INCIDENCIA DE TRANSPORTES":"IMPROCEDENTE: PEDIDO CON INCIDENCIA DE TRANSPORTES", "PEDIDO CONTABILIZADO":"IMPROCEDENTE: PEDIDO CONTABILIZADO", "PEDIDO EN DISTRIBUCIÓN O REPARTO":"IMPROCEDENTE: PEDIDO EN DISTRIBUCIÓN O REPARTO, ENTREGA ESTIMADA EN 24–48 HORAS LABORABLES.", "PEDIDO CON FALTA DE STOCK":"IMPROCEDENTE: PEDIDO CON FALTA DE STOCK", "PEDIDO ENTREGADO":"IMPROCEDENTE: PEDIDO ENTREGADO", "PEDIDO CON BLOQUEO DE ENTREGA / MANIPULACION PEDIDO":"IMPROCEDENTE: PEDIDO CON BLOQUEO DE ENTREGA / MANIPULACION PEDIDO", "PEDIDO INCOMPLETO FALTA TECNICO COMERCIAL":"IMPROCEDENTE:PEDIDO INCOMPLETO FALTA TECNICO COMERCIAL", "PEDIDO INCOMPLETO":"IMPROCEDENTE: PEDIDO INCOMPLETO FALTA DETERMINACION DE PRECIO", "SE SOLICITA ALBARAN": "COMPROBANTE DE ENTREGA SOLICITADO PARA SU ENVÍO AL CLIENTE.","ALBARAN ENVIADO":"EL COMPROBANTE DE ENTREGA HA SIDO ENVIADO AL CLIENTE.", "PENDIENTE DE CONCERTAR CITA CON EL CLIENTE PARA SU RECOGIDA":"PENDIENTE DE CONCERTAR CITA CON EL CLIENTE PARA SU RECOGIDA","MAL TABULADO": "IMPROCEDENTE: MAL TABULADO, TABULAR XXX", "FALTA CORREO": "IMPROCEDENTE: FALTA DE INFORMACION INDICAR CORREO", "FUERA DE PLAZO": "IMPROCEDENTE: FUERA DE PLAZO", "PEDIDO DEVUELTO": "IMPROCEDENTE: EL PEDIDO NO SE ENTREGÓ Y HA SIDO DEVUELTO AL ALMACÉN. LA DEVOLUCIÓN ESTÁ GESTIONADA.", "SE INFORMA PEDIDO IMEI XXXXX - ABONO": "IMPROCEDENTE: SE INFORMA PEDIDO IMEI XXXXX - ABONO", "TABULAR INCIDENCIA SOLICITUD ALBARAN SIN REPOSICIÓN.": "IMPROCEDENTE: TABULAR INCIDENCIA SOLICITUD ALBARAN SIN REPOSICIÓN.", "ENVIAR A TIENDA": "IMPROCEDENTE: AL SER UN EQUIPAMIENTO MÓVIL DE RENT EL DESISTIMIENTO TIENE QUE GESTIONARSE EN CUALQUIER TIENDA DE MOVISTAR","ENTREGADO":"ENTREGADO", "PENDIENTE DE RECOGIDA":"PENDIENTE DE RECOGIDA, RECOGIDA ESTIMADA EN 24–48 HORAS LABORABLES.", "FALTAN DATOS":"IMPROCEDENTE: FALTAN DATOS", "NO ES POSIBLE CAMBIO DE DIRECCION":"IMPROCEDENTE: NO ES POSIBLE CAMBIO DE DIRECCION", "ESCALAR A WF DE GAMA BLANCA (SE USA CUANDO APARECE 9014)":"IMPROCEDENTE: ESCALAR A WF DE GAMA BLANCA", "ESCALAR A POSVENTA":"IMPROCEDENTE: ESCALAR A POSVENTA", "NO ES POSIBLE CAMBIO DE TELEFONO POR TELCO":"IMPROCEDENTE: NO ES POSIBLE CAMBIO DE TELEFONO POR TELCO","SE ACTUALIZAN LOS DATOS":"SE ACTUALIZAN LOS DATOS", "TEXTO LIBRE": "10-12-2025 NOMBRE TRAMITADA RECOGIDA POR DESISTIMIENTO INC ", "NO CONSTA DEVUELTO":"IMPROCEDENTE: PEDIDO NO CONSTA DEVUELTO", "SOLICITADO REENVÍO":"SOLICITADO REENVÍO", "FALLIDA":"IMPROCEDENTE: RECOGIDA FALLIDA POR CLIENTE XXX; SI HAY QUE INTENTAR DE NUEVO LA RECOGIDA, HAY QUE GENERAR UN NUEVO ZCONTACTOS DE “REINTENTO DE RECOGIDA”."
  };

const editedTexts = {};
let currentKey = "";
let currentTip = "";

const selector=document.getElementById('selector');
const select=document.getElementById('tipSelect');
const textarea=document.getElementById('tipText');
const toast=document.getElementById('toast');

const allButtons=document.querySelectorAll('.buttons button,.buttons-secondary button');

allButtons.forEach(btn=>{
  btn.addEventListener('click',()=>{
    allButtons.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');

    currentKey = btn.dataset.t;
    const sorted=data[currentKey].slice().sort((a,b)=>a.localeCompare(b,'es'));

    select.innerHTML='';
    sorted.forEach(item=>{
      const opt=document.createElement('option');
      opt.value=item;
      opt.textContent=item;
      select.appendChild(opt);
    });

    select.selectedIndex=0;
    currentTip = sorted[0];

    const memKey = `${currentKey}|${currentTip}`;
    textarea.value = editedTexts[memKey] ?? descriptions[currentTip] ?? '';
    selector.style.display='flex';
  });
});

select.addEventListener('change',()=>{
  currentTip = select.value;
  const memKey = `${currentKey}|${currentTip}`;
  textarea.value = editedTexts[memKey] ?? descriptions[currentTip] ?? textarea.value;
});

textarea.addEventListener('input',()=>{
  if(!currentKey || !currentTip) return;
  editedTexts[`${currentKey}|${currentTip}`] = textarea.value;
});

document.getElementById('copyBtn').addEventListener('click',()=>{
  textarea.select();
  document.execCommand('copy');
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),2000);
});
  document.getElementById('resetBtn').addEventListener('click',()=>{
  if(!currentKey || !currentTip) return;

  const memKey = `${currentKey}|${currentTip}`;

  // Elimina el texto editado guardado
  delete editedTexts[memKey];

  // Restaura texto por defecto o vacío
  textarea.value = descriptions[currentTip] ?? '';

  // Feedback visual
  toast.textContent = "Tipificación restablecida";
  toast.classList.add('show');
  setTimeout(()=>{
    toast.classList.remove('show');
    toast.textContent = "Tipificación copiada";
  },2000);
});

</script>

<script>
function mostrarValidador(){
  const div = document.getElementById("validadorPlazo");
  div.style.display = div.style.display === "none" ? "flex" : "none";

  // Autocompletar fecha actual
  const hoy = new Date().toISOString().split('T')[0];
  document.getElementById("fechaActual").value = hoy;
}

function calcularDias(){
  const fechaEntrega = new Date(document.getElementById("fechaEntrega").value);
  const fechaActual = new Date(document.getElementById("fechaActual").value);

  if(!fechaEntrega || !fechaActual){
    document.getElementById("resultadoDias").innerText = "Selecciona ambas fechas";
    return;
  }

  const diferencia = fechaActual - fechaEntrega;
  const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));

  document.getElementById("resultadoDias").innerText = 
    `Han transcurrido ${dias} días`;
}
</script>

<script>
let horaVisible = true;

function actualizarHora(){
  const ahora = new Date();

  const hora = ahora.toLocaleTimeString("es-ES", {
    timeZone: "Europe/Madrid",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    hour12: true   // 👈 clave para formato 12h
  });

  document.getElementById("horaTexto").innerText = hora;
}

// Actualiza cada segundo
setInterval(actualizarHora, 1000);
actualizarHora();

// Mostrar / ocultar SOLO la hora
function toggleHora(){
  const hora = document.getElementById("horaTexto");

  hora.classList.toggle("oculto");
  horaVisible = !horaVisible;
}
</script>

</body>
</html>
